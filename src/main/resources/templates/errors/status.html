<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title + ' | Operational Close Validator'}">
        Error | Operational Close Validator
    </title>
</head>
<body>
    <main>
        <p th:text="${statusCode}">400</p>
        <h1 th:text="${title}">Solicitud inválida</h1>
        <p th:text="${message}">
            No fue posible completar la solicitud.
        </p>

        <p>
            <a th:href="@{/closes}">
                Volver a cierres operativos
            </a>
        </p>
    </main>
</body>
</html>
